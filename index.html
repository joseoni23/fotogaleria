<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CARLOS VEGA — Fotografía</title>
  <meta name="description" content="Portafolio fotográfico — Monterrey, México"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #e8e2d9;
      --muted: #666;
      --accent: #c9a96e;
      --white: #f5f0ea;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── CURSOR ── */
    * { cursor: none; }
    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .3s, height .3s, opacity .3s;
      mix-blend-mode: difference;
    }
    #cursor.expand { width: 48px; height: 48px; opacity: .5; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      transition: opacity .8s ease, visibility .8s;
    }
    #loader.hidden { opacity: 0; visibility: hidden; }
    .loader-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 8rem);
      letter-spacing: .15em;
      color: var(--white);
      overflow: hidden;
    }
    .loader-bar {
      width: 200px; height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }
    .loader-bar::after {
      content: '';
      position: absolute;
      left: -100%; top: 0;
      width: 100%; height: 100%;
      background: var(--accent);
      animation: loadbar 1.4s ease forwards;
    }
    @keyframes loadbar { to { left: 0; } }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,.95) 60%, transparent);
      backdrop-filter: blur(0px);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .2em;
      color: var(--white);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }

    nav { display: flex; gap: 2.5rem; align-items: center; }
    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      transition: color .3s;
    }
    nav a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex;
      align-items: flex-end;
      padding: 0 3rem 5rem;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: 
        radial-gradient(ellipse at 70% 40%, rgba(201,169,110,.06) 0%, transparent 60%),
        linear-gradient(to bottom, transparent 50%, var(--bg) 100%);
      z-index: 0;
    }
    .hero-line {
      position: absolute;
      width: 1px; height: 40vh;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      left: 50%; top: 10%;
      animation: heroline 3s ease infinite alternate;
    }
    @keyframes heroline {
      from { opacity: .2; transform: scaleY(.7); }
      to   { opacity: .6; transform: scaleY(1); }
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-eyebrow {
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 300;
      line-height: .9;
      color: var(--white);
      letter-spacing: -.02em;
    }
    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }
    .hero-sub {
      margin-top: 2rem;
      font-size: .8rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.8;
    }
    .scroll-hint {
      position: absolute;
      right: 3rem; bottom: 5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .scroll-hint::after {
      content: '';
      width: 1px; height: 60px;
      background: linear-gradient(to bottom, var(--muted), transparent);
      animation: scrollpulse 2s ease infinite;
    }
    @keyframes scrollpulse {
      0%,100% { opacity: .4; transform: scaleY(.8); }
      50%      { opacity: 1; transform: scaleY(1); }
    }

    /* ── FILTER BAR ── */
    .filter-section {
      padding: 3rem 3rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .filter-label {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: .5rem;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: .4rem 1.1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: none;
      transition: all .25s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,169,110,.05);
    }

    /* ── GALLERY ── */
    #gallery-section {
      padding: 2rem 3rem 6rem;
    }
    .gallery-stats {
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .gallery-stats span { color: var(--accent); }

    .masonry {
      columns: 3;
      column-gap: 1.2rem;
    }
    @media (max-width: 900px) { .masonry { columns: 2; } }
    @media (max-width: 560px) { .masonry { columns: 1; } }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      display: block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .6s ease, transform .6s ease;
    }
    .photo-card.visible { opacity: 1; transform: translateY(0); }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform .7s cubic-bezier(.25,.1,.25,1), filter .7s;
      filter: grayscale(20%) brightness(.9);
    }
    .photo-card:hover img {
      transform: scale(1.04);
      filter: grayscale(0%) brightness(1);
    }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.85) 0%, transparent 50%);
      opacity: 0;
      transition: opacity .4s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }
    .photo-card:hover .photo-overlay { opacity: 1; }
    .photo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--white);
      line-height: 1.2;
    }
    .photo-cat {
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: .3rem;
    }

    .no-photos {
      text-align: center;
      padding: 6rem 0;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
    }
    .no-photos small {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: .7rem;
      font-style: normal;
      margin-top: .5rem;
      letter-spacing: .1em;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(5,5,5,.97);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity .4s, visibility .4s;
    }
    #lightbox.open { opacity: 1; visibility: visible; }
    #lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      box-shadow: 0 0 100px rgba(0,0,0,.8);
    }
    .lb-close {
      position: absolute;
      top: 2rem; right: 2.5rem;
      background: none; border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: none;
      transition: color .2s;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .1em;
    }
    .lb-close:hover { color: var(--accent); }
    .lb-info {
      position: absolute;
      bottom: 2.5rem; left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }
    .lb-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--white);
    }
    .lb-cat {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: .25rem;
    }
    .lb-prev, .lb-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted);
      font-size: 2rem;
      cursor: none;
      padding: 1.5rem;
      transition: color .2s;
    }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    .lb-prev:hover, .lb-next:hover { color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p {
      font-size: .7rem;
      letter-spacing: .1em;
      color: var(--muted);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: .7rem;
      letter-spacing: .1em;
    }

    /* ── ANIMATIONS ── */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeup .9s ease forwards;
    }
    @keyframes fadeup {
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: .2s; }
    .delay-2 { animation-delay: .4s; }
    .delay-3 { animation-delay: .6s; }
  </style>
</head>
<body>

<!-- CURSOR -->
<div id="cursor"></div>

<!-- LOADER -->
<div id="loader">
  <div class="loader-name">VEGA</div>
  <div class="loader-bar"></div>
</div>

<!-- HEADER -->
<header>
  <a class="logo" href="#"><span>C</span>ARLOS VEGA</a>
  <nav>
    <a href="#gallery-section">Galería</a>
    <a href="mailto:contacto@carlosvega.mx">Contacto</a>
    <a href="/admin/" style="color: var(--border); font-size:.6rem;">● Admin</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-line"></div>
  <div class="hero-content">
    <div class="hero-eyebrow fade-up">Fotografía — Monterrey, México</div>
    <h1 class="hero-title fade-up delay-1">
      Luz<br><em>y</em><br>Tiempo
    </h1>
    <p class="hero-sub fade-up delay-2">
      Capturando momentos que el ojo pasa por alto. Retratos, paisajes y narrativas visuales.
    </p>
  </div>
  <div class="scroll-hint">Scroll</div>
</section>

<!-- FILTERS -->
<div class="filter-section">
  <span class="filter-label">Filtrar</span>
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="Retratos">Retratos</button>
  <button class="filter-btn" data-filter="Paisajes">Paisajes</button>
  <button class="filter-btn" data-filter="Bodas">Bodas</button>
  <button class="filter-btn" data-filter="Comercial">Comercial</button>
  <button class="filter-btn" data-filter="Otros">Otros</button>
</div>

<!-- GALLERY -->
<section id="gallery-section">
  <div class="gallery-stats" id="stats">Cargando galería…</div>
  <div class="masonry" id="gallery"></div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close">✕ cerrar</button>
  <button class="lb-prev">‹</button>
  <img id="lb-img" src="" alt=""/>
  <button class="lb-next">›</button>
  <div class="lb-info">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-cat" id="lb-cat"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2025 Carlos Vega — Fotografía</p>
  <a href="mailto:contacto@carlosvega.mx">contacto@carlosvega.mx</a>
</footer>

<script>
  // ── Cursor
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .photo-card').forEach(el => {
    el.addEventListener('mouseenter', () => cur.classList.add('expand'));
    el.addEventListener('mouseleave', () => cur.classList.remove('expand'));
  });

  // ── Loader
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1600);
  });

  // ── Data & Gallery
  let allPhotos = [];
  let filtered  = [];
  let currentIdx = 0;

  async function loadGallery() {
    try {
      const res = await fetch('/content/photos.json');
      if (!res.ok) throw new Error('no data');
      const data = await res.json();
      allPhotos = data.photos || [];
    } catch {
      // Demo photos if no JSON exists yet
      allPhotos = [
        { title: 'Luz dorada', category: 'Retratos', image: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800&q=80', description: '' },
        { title: 'Sierra Madre', category: 'Paisajes', image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80', description: '' },
        { title: 'Ceremonia', category: 'Bodas', image: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80', description: '' },
        { title: 'Producto XR', category: 'Comercial', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80', description: '' },
        { title: 'Barrio antiguo', category: 'Paisajes', image: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80', description: '' },
        { title: 'Íntimo', category: 'Retratos', image: 'https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=800&q=80', description: '' },
        { title: 'Primer baile', category: 'Bodas', image: 'https://images.unsplash.com/photo-1529636798458-92182e662485?w=800&q=80', description: '' },
        { title: 'Madrugada', category: 'Paisajes', image: 'https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?w=800&q=80', description: '' },
        { title: 'Campaña', category: 'Comercial', image: 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800&q=80', description: '' },
      ];
    }
    renderGallery('all');
  }

  function renderGallery(filter) {
    filtered = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
    const gallery = document.getElementById('gallery');
    const stats   = document.getElementById('stats');
    gallery.innerHTML = '';

    if (filtered.length === 0) {
      gallery.innerHTML = '<div class="no-photos">Ninguna foto en esta categoría<small>Sube fotos desde el panel de administración</small></div>';
      stats.innerHTML = 'Mostrando <span>0</span> fotografías';
      return;
    }

    stats.innerHTML = `Mostrando <span>${filtered.length}</span> fotografía${filtered.length !== 1 ? 's' : ''}`;

    filtered.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.style.transitionDelay = (i % 6) * 80 + 'ms';
      card.innerHTML = `
        <img src="${photo.image}" alt="${photo.title}" loading="lazy"/>
        <div class="photo-overlay">
          <div class="photo-title">${photo.title}</div>
          <div class="photo-cat">${photo.category}</div>
        </div>`;
      card.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(card);
    });

    // Intersection observer for fade-in
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: .1 });
    document.querySelectorAll('.photo-card').forEach(c => observer.observe(c));
  }

  // ── Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(btn.dataset.filter);
    });
  });

  // ── Lightbox
  const lb = document.getElementById('lightbox');
  function openLightbox(idx) {
    currentIdx = idx;
    updateLightbox();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }
  function updateLightbox() {
    const p = filtered[currentIdx];
    document.getElementById('lb-img').src   = p.image;
    document.getElementById('lb-title').textContent = p.title;
    document.getElementById('lb-cat').textContent   = p.category;
  }

  document.querySelector('.lb-close').addEventListener('click', closeLightbox);
  document.querySelector('.lb-prev').addEventListener('click', () => {
    currentIdx = (currentIdx - 1 + filtered.length) % filtered.length;
    updateLightbox();
  });
  document.querySelector('.lb-next').addEventListener('click', () => {
    currentIdx = (currentIdx + 1) % filtered.length;
    updateLightbox();
  });
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft')  { currentIdx = (currentIdx - 1 + filtered.length) % filtered.length; updateLightbox(); }
    if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % filtered.length; updateLightbox(); }
  });

  loadGallery();
</script>
</body>
</html>
